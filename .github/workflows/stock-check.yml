name: Universal Stock Tracker

on:
  workflow_dispatch:

  schedule:
    - cron: "*/10 * * * *"

jobs:
  track:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Tracker
        run: |
          python tracker.py
